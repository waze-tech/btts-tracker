<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTTS Tracker | Model History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --bg-elevated: #111827;
      --card: #1a1f2e;
      --card-hover: #242938;
      --border: #2d3548;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --accent: #22c55e;
      --accent-dim: #166534;
      --accent-glow: rgba(34, 197, 94, 0.3);
      --warning: #eab308;
      --danger: #ef4444;
      --purple: #8b5cf6;
      --blue: #3b82f6;
      --teal: #14b8a6;
      --gold: #fbbf24;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    
    .hero {
      background: linear-gradient(135deg, var(--bg-elevated) 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    
    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent), #4ade80);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle { color: var(--text-muted); font-size: 1rem; }
    
    nav {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    
    nav a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    
    nav a:hover { color: var(--text); background: var(--card); }
    nav a.active { color: var(--accent); background: var(--card); }
    
    .content { padding: 2rem 0; }
    
    .current-version {
      background: var(--card);
      border: 1px solid var(--accent);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 30px var(--accent-glow);
    }
    
    .current-version h2 {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .version-number {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    
    .weights-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-top: 1rem;
    }
    
    .weight-card {
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }
    
    .weight-card .value {
      font-size: 1.5rem;
      font-weight: 700;
    }
    
    .weight-card.xg .value { color: var(--gold); }
    .weight-card.historic .value { color: var(--purple); }
    .weight-card.patterns .value { color: var(--blue); }
    .weight-card.form .value { color: var(--teal); }
    
    .weight-card .label {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 0.25rem;
    }
    
    .timeline {
      position: relative;
      padding-left: 2rem;
    }
    
    .timeline::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }
    
    .timeline-item {
      position: relative;
      margin-bottom: 1.5rem;
    }
    
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -2rem;
      top: 0.5rem;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--card);
      border: 3px solid var(--accent);
    }
    
    .timeline-item.pending::before {
      border-color: var(--warning);
      animation: pulse 2s infinite;
    }
    
    .timeline-item.rollback::before {
      border-color: var(--danger);
    }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(234, 179, 8, 0); }
    }
    
    .timeline-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
    }
    
    .timeline-card.pending {
      border-color: var(--warning);
    }
    
    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
    }
    
    .timeline-version {
      font-weight: 700;
      color: var(--text);
    }
    
    .timeline-date {
      font-size: 0.85rem;
      color: var(--text-dim);
    }
    
    .timeline-badge {
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .timeline-badge.approved { background: rgba(34, 197, 94, 0.2); color: var(--accent); }
    .timeline-badge.pending { background: rgba(234, 179, 8, 0.2); color: var(--warning); }
    .timeline-badge.rollback { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    
    .timeline-reason {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    
    .weight-changes {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }
    
    .weight-change {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.25rem 0.5rem;
      background: rgba(0,0,0,0.2);
      border-radius: 4px;
      font-size: 0.8rem;
    }
    
    .weight-change .name { color: var(--text-dim); }
    .weight-change .arrow { color: var(--text-dim); }
    .weight-change .value { font-weight: 600; }
    .weight-change .value.up { color: var(--accent); }
    .weight-change .value.down { color: var(--danger); }
    .weight-change .value.same { color: var(--text-muted); }
    
    .timeline-meta {
      font-size: 0.8rem;
      color: var(--text-dim);
    }
    
    .pending-section {
      background: var(--card);
      border: 1px solid var(--warning);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .pending-section h2 {
      color: var(--warning);
      font-size: 1rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .no-data {
      text-align: center;
      color: var(--text-dim);
      padding: 2rem;
    }
    
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--text-muted);
    }
    
    @media (max-width: 600px) {
      .weights-grid { grid-template-columns: repeat(2, 1fr); }
      .timeline { padding-left: 1.5rem; }
      .timeline-item::before { left: -1.5rem; width: 12px; height: 12px; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="container">
      <h1>📜 Model History</h1>
      <p class="subtitle">Track changes to the prediction model over time</p>
      <nav>
        <a href="/">Predictions</a>
        <a href="/accuracy.html">Accuracy</a>
        <a href="/my-picks.html">My Picks</a>
        <a href="/model-history.html" class="active">Model History</a>
        <a href="/how-it-works.html">How It Works</a>
      </nav>
    </div>
  </div>
  
  <div class="container content">
    <div class="current-version" id="currentVersion">
      <h2>Current Model Version</h2>
      <div class="version-number" id="versionNumber">Loading...</div>
      <div class="weights-grid" id="weightsGrid">
        <div class="weight-card xg">
          <div class="value" id="xgWeight">-</div>
          <div class="label">xG Poisson</div>
        </div>
        <div class="weight-card historic">
          <div class="value" id="historicWeight">-</div>
          <div class="label">Historic BTTS</div>
        </div>
        <div class="weight-card patterns">
          <div class="value" id="patternsWeight">-</div>
          <div class="label">Scoring Patterns</div>
        </div>
        <div class="weight-card form">
          <div class="value" id="formWeight">-</div>
          <div class="label">Recent Form</div>
        </div>
      </div>
    </div>
    
    <div class="pending-section" id="pendingSection" style="display: none;">
      <h2>⏳ Pending Proposals</h2>
      <div id="pendingList"></div>
    </div>
    
    <h2 style="margin-bottom: 1.5rem; color: var(--text);">📅 Change History</h2>
    <div class="timeline" id="timeline">
      <div class="loading">Loading history...</div>
    </div>
  </div>
  
  <script>
    async function loadChangelog() {
      try {
        const response = await fetch('/model-changelog.json');
        if (response.ok) {
          return await response.json();
        }
      } catch (e) {
        console.log('Error loading changelog:', e);
      }
      return null;
    }
    
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-GB', { 
        weekday: 'short',
        day: 'numeric', 
        month: 'short',
        year: 'numeric'
      });
    }
    
    function renderCurrentVersion(changelog) {
      document.getElementById('versionNumber').textContent = `v${changelog.currentVersion}`;
      
      const weights = changelog.currentWeights;
      document.getElementById('xgWeight').textContent = `${(weights.xgPoisson * 100).toFixed(0)}%`;
      document.getElementById('historicWeight').textContent = `${(weights.historicBtts * 100).toFixed(0)}%`;
      document.getElementById('patternsWeight').textContent = `${(weights.scoringPatterns * 100).toFixed(0)}%`;
      document.getElementById('formWeight').textContent = `${(weights.recentForm * 100).toFixed(0)}%`;
    }
    
    function renderWeightChanges(previousWeights, newWeights) {
      if (!previousWeights) return '';
      
      const changes = [];
      const names = {
        xgPoisson: 'xG',
        historicBtts: 'Historic',
        scoringPatterns: 'Patterns',
        recentForm: 'Form'
      };
      
      for (const [key, newVal] of Object.entries(newWeights)) {
        const oldVal = previousWeights[key];
        if (oldVal !== undefined) {
          const diff = newVal - oldVal;
          const diffClass = diff > 0 ? 'up' : diff < 0 ? 'down' : 'same';
          const arrow = diff > 0 ? '↑' : diff < 0 ? '↓' : '→';
          changes.push(`
            <span class="weight-change">
              <span class="name">${names[key] || key}</span>
              <span class="arrow">${arrow}</span>
              <span class="value ${diffClass}">${(newVal * 100).toFixed(0)}%</span>
            </span>
          `);
        }
      }
      
      return `<div class="weight-changes">${changes.join('')}</div>`;
    }
    
    function renderPendingProposals(changelog) {
      const pending = changelog.pendingProposals?.filter(p => p.status === 'pending') || [];
      
      if (pending.length === 0) {
        document.getElementById('pendingSection').style.display = 'none';
        return;
      }
      
      document.getElementById('pendingSection').style.display = 'block';
      
      const html = pending.map(p => `
        <div class="timeline-card pending">
          <div class="timeline-header">
            <span class="timeline-version">Proposal: ${p.id}</span>
            <span class="timeline-badge pending">Pending Approval</span>
          </div>
          <p class="timeline-reason">${p.reasoning}</p>
          ${renderWeightChanges(changelog.currentWeights, p.proposedWeights)}
          <div class="timeline-meta">
            Created: ${formatDate(p.createdAt)}
            <br>
            <code style="font-size: 0.75rem; color: var(--warning);">
              node scripts/model-review.js approve ${p.id} "Your Name"
            </code>
          </div>
        </div>
      `).join('');
      
      document.getElementById('pendingList').innerHTML = html;
    }
    
    function renderTimeline(changelog) {
      const history = changelog.changelog || [];
      
      if (history.length === 0) {
        document.getElementById('timeline').innerHTML = `
          <div class="no-data">
            <p>No model changes recorded yet.</p>
            <p style="margin-top: 0.5rem; font-size: 0.9rem;">Changes will appear here after the first Thursday model review.</p>
          </div>
        `;
        return;
      }
      
      const html = history.slice().reverse().map(entry => {
        const isRollback = entry.author === 'rollback';
        const itemClass = isRollback ? 'rollback' : '';
        const badgeClass = isRollback ? 'rollback' : 'approved';
        const badgeText = isRollback ? 'Rollback' : 'Approved';
        
        return `
          <div class="timeline-item ${itemClass}">
            <div class="timeline-card">
              <div class="timeline-header">
                <div>
                  <span class="timeline-version">v${entry.version}</span>
                  <span class="timeline-date">${formatDate(entry.date)}</span>
                </div>
                <span class="timeline-badge ${badgeClass}">${badgeText}</span>
              </div>
              <p class="timeline-reason">${entry.reasoning}</p>
              ${renderWeightChanges(entry.previousWeights, entry.changes?.weights)}
              <div class="timeline-meta">
                ${entry.approvedBy ? `Approved by: ${entry.approvedBy}` : `Author: ${entry.author}`}
              </div>
            </div>
          </div>
        `;
      }).join('');
      
      document.getElementById('timeline').innerHTML = html;
    }
    
    async function init() {
      const changelog = await loadChangelog();
      
      if (!changelog) {
        document.getElementById('timeline').innerHTML = `
          <div class="no-data">
            <p>No changelog found.</p>
            <p style="margin-top: 0.5rem; font-size: 0.9rem;">Run <code>node scripts/model-review.js</code> to initialize.</p>
          </div>
        `;
        return;
      }
      
      renderCurrentVersion(changelog);
      renderPendingProposals(changelog);
      renderTimeline(changelog);
    }
    
    init();
  </script>
</body>
</html>
