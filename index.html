<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTTS Tracker | Championship, League 1 & 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --bg-elevated: #111827;
      --card: #1a1f2e;
      --card-hover: #242938;
      --border: #2d3548;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --accent: #22c55e;
      --accent-dim: #166534;
      --accent-glow: rgba(34, 197, 94, 0.3);
      --warning: #eab308;
      --danger: #ef4444;
      --championship: #8b5cf6;
      --league1: #3b82f6;
      --league2: #14b8a6;
      --gold: #fbbf24;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    
    .hero {
      background: linear-gradient(135deg, var(--bg-elevated) 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 2rem 2rem;
      text-align: center;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent), #4ade80, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px var(--accent-glow);
    }
    
    .subtitle {
      color: var(--text-muted);
      font-size: 1.1rem;
    }
    
    .leagues-subtitle {
      font-size: 0.9rem;
      margin-top: 0.5rem;
      color: var(--text-dim);
    }
    
    .leagues-subtitle span {
      margin: 0 0.5rem;
    }
    
    .stats-bar {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin: 2rem 0;
    }
    
    .stat-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      text-align: center;
      min-width: 130px;
      transition: all 0.2s;
    }
    
    .stat-box:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    
    .stat-box .value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent);
    }
    
    .stat-box .label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      padding: 0 1rem;
    }
    
    .filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }
    
    .sort-select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    
    .sort-select:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .fixtures-grid {
      display: grid;
      gap: 1.25rem;
      padding-bottom: 3rem;
    }
    
    .fixture-wrapper {
      position: relative;
    }
    
    .fixture-wrapper.top-pick .fixture-card {
      border-color: var(--gold);
      box-shadow: 0 0 30px rgba(251, 191, 36, 0.15);
    }
    
    .fixture-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      transition: all 0.2s;
      border-left: 4px solid var(--league-color, var(--accent));
    }
    
    .fixture-card:hover {
      background: var(--card-hover);
    }
    
    .rank-badge {
      position: absolute;
      top: -10px;
      left: -10px;
      background: linear-gradient(135deg, var(--gold), #f59e0b);
      color: #000;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.9rem;
      box-shadow: 0 4px 12px rgba(251, 191, 36, 0.4);
      z-index: 10;
    }
    
    .value-badge {
      position: absolute;
      top: -10px;
      right: 12px;
      background: linear-gradient(135deg, var(--accent), #16a34a);
      color: #000;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 12px var(--accent-glow);
      z-index: 10;
    }
    
    .fixture-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    
    .league-badge {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      background: var(--league-color, var(--accent));
      color: #000;
    }
    
    .kick-off {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    
    .teams {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    
    .team {
      flex: 1;
      text-align: center;
      padding: 0.75rem;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
    }
    
    .team.home { border-left: 3px solid var(--accent); }
    .team.away { border-right: 3px solid var(--text-dim); }
    
    .team-name {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    
    .team-location {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }
    
    .match-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 0.5rem;
      min-width: 70px;
    }
    
    .vs {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-dim);
    }
    
    .expected-goals {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      margin-top: 0.5rem;
      font-size: 1.1rem;
      font-weight: 700;
    }
    
    .xg-home { color: var(--accent); }
    .xg-away { color: var(--text-muted); }
    .xg-divider { color: var(--text-dim); }
    .xg-label { font-size: 0.65rem; color: var(--text-dim); margin-top: 0.25rem; }
    
    .historic-form {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-top: 0.5rem;
    }
    
    .form-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    
    .form-dot:hover { transform: scale(1.3); }
    .form-dot.btts { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
    .form-dot.no-btts { background: var(--danger); }
    
    .probability-section {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      padding: 1rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }
    
    .main-prob {
      flex-shrink: 0;
    }
    
    .prob-ring {
      width: 100px;
      height: 100px;
      position: relative;
    }
    
    .prob-ring svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    
    .ring-bg {
      fill: none;
      stroke: var(--border);
      stroke-width: 3;
    }
    
    .ring-fill {
      fill: none;
      stroke: var(--accent);
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dasharray 0.5s ease;
    }
    
    .prob-ring.high .ring-fill { stroke: var(--accent); }
    .prob-ring.medium .ring-fill { stroke: var(--warning); }
    .prob-ring.low .ring-fill { stroke: var(--text-dim); }
    
    .prob-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    
    .prob-center .prob-value {
      font-size: 1.5rem;
      font-weight: 800;
      display: block;
    }
    
    .prob-ring.high .prob-center .prob-value { color: var(--accent); }
    .prob-ring.medium .prob-center .prob-value { color: var(--warning); }
    .prob-ring.low .prob-center .prob-value { color: var(--text-dim); }
    
    .prob-center .prob-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .prob-details {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      flex: 1;
    }
    
    .detail-box {
      text-align: center;
      padding: 0.5rem;
      background: rgba(0,0,0,0.15);
      border-radius: 8px;
    }
    
    .detail-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.25rem;
    }
    
    .detail-value {
      font-size: 1.25rem;
      font-weight: 700;
    }
    
    .detail-value.odds { color: var(--text); }
    .detail-box.positive .detail-value.value { color: var(--accent); }
    .detail-box.negative .detail-value.value { color: var(--danger); }
    .detail-value.confidence.high { color: var(--accent); }
    .detail-value.confidence.medium { color: var(--warning); }
    .detail-value.confidence.low { color: var(--text-dim); }
    
    .detail-sub {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 0.15rem;
    }
    
    .expand-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.6rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s;
    }
    
    .expand-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    
    .pick-btn {
      background: linear-gradient(135deg, var(--accent), #16a34a);
      border: none;
      color: #fff;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s;
      margin-top: 0.75rem;
    }
    
    .pick-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--accent-glow);
    }
    
    .pick-btn.picked {
      background: var(--card);
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    
    .card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }
    
    .card-actions .expand-btn {
      flex: 1;
      margin-top: 0;
    }
    
    .card-actions .pick-btn {
      margin-top: 0;
      white-space: nowrap;
    }
    
    .expand-btn.expanded {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }
    
    .expand-icon {
      transition: transform 0.2s;
    }
    
    .expand-btn.expanded .expand-icon {
      transform: rotate(180deg);
    }
    
    .expanded-details {
      display: none;
      padding-top: 1rem;
      margin-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    
    .expanded-details.show {
      display: block;
    }
    
    .analysis-section {
      margin-bottom: 1.25rem;
    }
    
    .analysis-section h4 {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      font-weight: 600;
    }
    
    .model-breakdown {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .model-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .model-label {
      width: 70px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    
    .model-bar {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .model-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #4ade80);
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    
    .model-value {
      width: 40px;
      text-align: right;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
    }
    
    .teams-analysis {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    
    .team-analysis {
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 1rem;
    }
    
    .team-analysis h4 {
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 0.75rem;
      font-weight: 600;
    }
    
    .team-detailed-stats {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
    }
    
    .stat-row.strength {
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px dashed var(--border);
    }
    
    .stat-label { color: var(--text-muted); }
    .stat-value { font-weight: 600; color: var(--text); }
    .stat-value.highlight-good { color: var(--accent); }
    .stat-value.highlight-bad { color: var(--danger); }
    
    .no-data {
      color: var(--text-dim);
      font-style: italic;
      font-size: 0.85rem;
    }
    
    .insights {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .insights li {
      font-size: 0.85rem;
      color: var(--text-muted);
      padding-left: 1.25rem;
      position: relative;
    }
    
    .insights li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--accent);
    }
    
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--text-muted);
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .last-updated {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.85rem;
      padding: 1.5rem 0;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }
    
    #methodology {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    
    #methodology h3 {
      font-size: 1rem;
      margin-bottom: 0.75rem;
      color: var(--text);
    }
    
    #methodology p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    
    .methodology-models {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
    }
    
    .method-card {
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 0.75rem;
      text-align: center;
    }
    
    .method-weight {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
    }
    
    .method-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      margin: 0.25rem 0;
    }
    
    .method-desc {
      font-size: 0.7rem;
      color: var(--text-dim);
    }
    
    @media (max-width: 900px) {
      .prob-details { grid-template-columns: repeat(2, 1fr); }
      .methodology-models { grid-template-columns: repeat(2, 1fr); }
    }
    
    @media (max-width: 768px) {
      .hero { padding: 1.5rem 1rem; }
      h1 { font-size: 1.75rem; }
      .stat-box { min-width: 100px; padding: 0.75rem 1rem; }
      .stat-box .value { font-size: 1.5rem; }
      
      .teams { flex-direction: column; gap: 0.5rem; }
      .team.home { border-left: none; border-top: 3px solid var(--accent); }
      .team.away { border-right: none; border-bottom: 3px solid var(--text-dim); }
      .match-info { flex-direction: row; padding: 0.5rem 0; }
      .expected-goals { margin-top: 0; margin-left: 1rem; }
      .xg-label { display: none; }
      
      .probability-section { flex-direction: column; }
      .prob-ring { width: 90px; height: 90px; }
      .prob-details { width: 100%; }
      
      .teams-analysis { grid-template-columns: 1fr; }
      .methodology-models { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="container">
      <h1>⚽ BTTS Tracker</h1>
      <p class="subtitle">Advanced Both Teams To Score Probability Analysis</p>
      <p class="leagues-subtitle">
        <span style="color: var(--championship);">● Championship</span>
        <span style="color: var(--league1);">● League One</span>
        <span style="color: var(--league2);">● League Two</span>
      </p>
      <nav style="display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap;">
        <a href="/" style="color: var(--accent); text-decoration: none; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 500; font-size: 0.9rem; background: var(--card);">Predictions</a>
        <a href="/accuracy.html" style="color: var(--text-muted); text-decoration: none; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 500; font-size: 0.9rem; transition: all 0.2s;" onmouseover="this.style.color='var(--text)';this.style.background='var(--card)'" onmouseout="this.style.color='var(--text-muted)';this.style.background='transparent'">Accuracy</a>
        <a href="/my-picks.html" style="color: var(--text-muted); text-decoration: none; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 500; font-size: 0.9rem; transition: all 0.2s;" onmouseover="this.style.color='var(--text)';this.style.background='var(--card)'" onmouseout="this.style.color='var(--text-muted)';this.style.background='transparent'">My Picks</a>
        <a href="/model-history.html" style="color: var(--text-muted); text-decoration: none; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 500; font-size: 0.9rem; transition: all 0.2s;" onmouseover="this.style.color='var(--text)';this.style.background='var(--card)'" onmouseout="this.style.color='var(--text-muted)';this.style.background='transparent'">Model History</a>
        <a href="/how-it-works.html" style="color: var(--text-muted); text-decoration: none; padding: 0.5rem 1rem; border-radius: 8px; font-weight: 500; font-size: 0.9rem; transition: all 0.2s;" onmouseover="this.style.color='var(--text)';this.style.background='var(--card)'" onmouseout="this.style.color='var(--text-muted)';this.style.background='transparent'">How It Works</a>
      </nav>
    </div>
  </div>
  
  <div class="container">
    <div class="stats-bar" id="statsBar">
      <div class="stat-box">
        <div class="value" id="totalFixtures">-</div>
        <div class="label">Fixtures</div>
      </div>
      <div class="stat-box">
        <div class="value" id="avgProbability">-</div>
        <div class="label">Avg Probability</div>
      </div>
      <div class="stat-box">
        <div class="value" id="highValue">-</div>
        <div class="label">Value Bets</div>
      </div>
      <div class="stat-box">
        <div class="value" id="highConfidence">-</div>
        <div class="label">High Confidence</div>
      </div>
    </div>
    
    <div id="methodology"></div>
    
    <div class="controls">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All Leagues</button>
        <button class="filter-btn" data-filter="Championship">Championship</button>
        <button class="filter-btn" data-filter="League One">League One</button>
        <button class="filter-btn" data-filter="League Two">League Two</button>
      </div>
      <select class="sort-select" id="dateFilter">
        <option value="all">All Dates</option>
        <option value="today">Today</option>
        <option value="tomorrow">Tomorrow</option>
        <option value="week">This Week</option>
        <option value="next-week">Next Week</option>
      </select>
      <select class="sort-select" id="topNSelect">
        <option value="all">Show: All</option>
        <option value="3" selected>Show: Top 3</option>
        <option value="5">Show: Top 5</option>
        <option value="10">Show: Top 10</option>
        <option value="15">Show: Top 15</option>
      </select>
      <select class="sort-select" id="sortSelect">
        <option value="probability">Sort: Probability</option>
        <option value="value">Sort: Value Rating</option>
        <option value="odds">Sort: Best Odds</option>
        <option value="kickoff">Sort: Kick-off Time</option>
      </select>
    </div>
    
    <div class="fixtures-grid" id="fixturesGrid">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Loading fixtures...</p>
      </div>
    </div>
    
    <p class="last-updated" id="lastUpdated"></p>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
